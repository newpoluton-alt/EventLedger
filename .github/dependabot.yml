version: 2

updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels: [dependencies, kotlin]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels: [dependencies, container]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels: [dependencies, ci]

  - package-ecosystem: terraform
    directory: /infra/terraform
    schedule:
      interval: weekly
      day: monday
      time: "05:45"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels: [dependencies, infrastructure]
