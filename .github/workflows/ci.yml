name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Kotlin quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run checks
        run: ./gradlew --no-daemon check

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-reports
          path: |
            build/reports/tests/
            build/reports/jacoco/
            build/reports/ktlint/
          if-no-files-found: ignore
          retention-days: 14

  container:
    name: Container build, scan, and smoke test
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: |
            eventledger:ci
            eventledger:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: eventledger:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

      - name: Start the complete stack
        run: docker compose up --no-build --detach --wait --wait-timeout 240

      - name: Probe application readiness
        run: curl --fail --silent --show-error http://127.0.0.1:8080/actuator/health/readiness

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install black-box test dependencies
        run: python -m pip install --requirement tests/requirements.txt

      - name: Run API idempotency and reconciliation tests
        env:
          EVENTLEDGER_RUN_INTEGRATION: "1"
          EVENTLEDGER_API_KEY: local-development-key
        run: python -m pytest -c tests/pytest.ini tests

      - name: Print stack diagnostics
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color --tail=200

      - name: Stop the stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  infrastructure:
    name: Infrastructure validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate Compose model
        run: docker compose config --quiet

      - name: Validate Prometheus rules and configuration
        run: >-
          docker run --rm
          --volume "$PWD/observability:/etc/prometheus:ro"
          --entrypoint promtool
          prom/prometheus:v3.1.0
          check config /etc/prometheus/prometheus.yml

      - name: Validate Alertmanager routing
        run: >-
          docker run --rm
          --volume "$PWD/observability:/etc/alertmanager:ro"
          --entrypoint amtool
          prom/alertmanager:v0.28.1
          check-config /etc/alertmanager/alertmanager.yml

      - name: Validate OpenTelemetry Collector configuration
        run: >-
          docker run --rm
          --volume "$PWD/observability/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro"
          otel/opentelemetry-collector-contrib:0.120.0
          validate --config=/etc/otelcol-contrib/config.yml

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.3
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform -chdir=infra/terraform fmt -check -recursive

      - name: Initialize Terraform providers
        run: terraform -chdir=infra/terraform init -backend=false -input=false

      - name: Validate Terraform
        run: terraform -chdir=infra/terraform validate

      - name: Scan Terraform configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra/terraform
          format: table
          exit-code: "1"
          severity: CRITICAL
